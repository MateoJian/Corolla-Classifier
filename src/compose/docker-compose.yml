version: '3'


services:
  backend:
    build:
      context: ../
      dockerfile: Dockerfile_inference
    container_name: backend
    tty: true
    environment: 
      - REDIS_HOST=redis

  redis:
    image: redis
    container_name: redis
    #ports:
    #  - "6379:6379"

  nginx:
    image: nginx
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

  api: 
    build: 
      context: ../
      dockerfile: Dockerfile_api 
    container_name: api 
    environment:
      - REDIS_HOST=redis 
    depends_on: 
      - redis
    ports: 
      - "5000:5000"